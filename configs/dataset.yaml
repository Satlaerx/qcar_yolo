# configs/dataset.yaml
# YOLOv11 dataset configuration
# Edit paths if your project root differs

path: data/splits        # root dir (relative to this file or absolute)
train: train/images
val:   val/images
test:  test/images          # optional

# Number of classes
nc: 3

# Class names — adjust to your actual sign categories
names:
  0: StopSign
  1: YieldSign
  2: RoundaboutSign
  
# Notes:
# - Labels must be in YOLO format: class_id cx cy w h (normalised 0-1)
# - One .txt label file per image, same name as image
# - Images with no signs need an empty .txt file (or omit)
